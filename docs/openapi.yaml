openapi: 3.0.3
info:
  title: PovarUp Marketplace API
  version: 1.0.0
servers:
  - url: http://localhost:4000/api
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but not authorized for this resource
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
    Shift:
      type: object
      properties:
        id: { type: string }
        businessId: { type: string }
        locationId: { type: string }
        title: { type: string }
        startAt: { type: string, format: date-time }
        endAt: { type: string, format: date-time }
        payRateCents: { type: integer }
        status: { type: string }
        normalizedStatus: { type: string, enum: [open, filled, closed, cancelled] }
        productStatus: { type: string, enum: [open, filled, closed, cancelled] }
    Application:
      type: object
      properties:
        id: { type: string }
        shiftId: { type: string }
        workerId: { type: string }
        status: { type: string }
        normalizedStatus: { type: string, enum: [submitted, offered, rejected, withdrawn] }
        productStatus: { type: string, enum: [submitted, offered, rejected, withdrawn] }
    Assignment:
      type: object
      properties:
        id: { type: string }
        shiftId: { type: string }
        workerId: { type: string }
        businessId: { type: string }
        status: { type: string }
        normalizedStatus: { type: string, enum: [offered, active, checked_in, checked_out, completed, paid, cancelled] }
        productStatus: { type: string, enum: [offered, active, checked_in, checked_out, completed, paid, cancelled] }
        escrowLockedCents: { type: integer }
    Payout:
      type: object
      properties:
        id: { type: string }
        assignmentId: { type: string }
        workerId: { type: string }
        amountCents: { type: integer }
        status: { type: string, enum: [created, pending, paid, failed] }
        internalStatus: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }
        note: { type: string, nullable: true }
    Message:
      type: object
      properties:
        id: { type: string }
        chatId: { type: string }
        senderId: { type: string }
        text: { type: string }
        createdAt: { type: string, format: date-time }
        violationDetected: { type: boolean }
paths:
  /health:
    get:
      responses: { '200': { description: ok } }
  /ready:
    get:
      responses: { '200': { description: ready } }
  /seed:
    post:
      responses: { '200': { description: seeded } }
  /auth/session:
    post:
      deprecated: true
      responses: { '410': { description: deprecated auth flow } }
  /auth/login:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, password]
              properties: { userId: { type: string }, password: { type: string } }
      responses: { '200': { description: session } }
  /auth/onboard:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inviteCode, userId, password, displayName]
              properties: { inviteCode: { type: string }, userId: { type: string }, password: { type: string }, displayName: { type: string } }
      responses: { '201': { description: account created } }
  /auth/logout:
    post:
      security: [{ BearerAuth: [] }]
      responses: { '200': { description: session revoked } }
  /workers:
    get: { responses: { '200': { description: list workers } } }
  /businesses:
    get: { responses: { '200': { description: list businesses } } }
  /shifts:
    get:
      responses:
        '200': { description: list shifts, content: { application/json: { schema: { type: object } } } }
    post:
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Shift' } } } }
      responses: { '201': { description: created } }

  /shifts/{id}:
    get:
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { '200': { description: shift detail } }
  /business/shifts:
    get:
      security: [{ BearerAuth: [] }]
      responses: { '200': { description: business owned shifts } }
  /business/shifts/{shiftId}/applications:
    get:
      parameters: [{ name: shiftId, in: path, required: true, schema: { type: string } }]
      security: [{ BearerAuth: [] }]
      responses: { '200': { description: applications for owned shift } }
  /applications:
    get:
      description: |
        Returns only applications relevant to the authenticated actor (worker owns application,
        business owns related shift) unless role is admin.
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: list apps }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { shiftId: { type: string }, workerId: { type: string } }
      responses: { '201': { description: created } }
  /assignments:
    get:
      description: Returns assignment list filtered to caller ownership; non-owners receive an empty list.
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: list assignments }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /assignments/{id}:
    get:
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { '200': { description: assignment detail } }
  /assignments/offer:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { applicationId: { type: string }, businessId: { type: string } } }
      responses: { '201': { description: offered } }
  /assignments/{id}/accept:
    post:
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { '200': { description: accepted } }
  /attendance/check-in:
    post: { responses: { '201': { description: check-in } } }
  /attendance/check-out:
    post: { responses: { '201': { description: check-out } } }
  /ratings:
    post: { responses: { '201': { description: rating saved } } }
  /chats/by-assignment/{assignmentId}:
    get:
      parameters: [{ name: assignmentId, in: path, required: true, schema: { type: string } }]
      responses: { '200': { description: chat } }
  /chats/{chatId}/messages:
    get:
      parameters: [{ name: chatId, in: path, required: true, schema: { type: string } }]
      responses: { '200': { description: messages } }
  /chats/{assignmentId}/messages:
    post:
      parameters: [{ name: assignmentId, in: path, required: true, schema: { type: string } }]
      responses: { '201': { description: sent } }
  /contacts/reveal/{assignmentId}:
    get:
      parameters: [{ name: assignmentId, in: path, required: true, schema: { type: string } }]
      security: [{ BearerAuth: [] }]
      responses:
        '410': { description: removed; use in-platform chat }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /escrow/fund:
    post: { responses: { '201': { description: funded } } }
  /escrow/balance/{businessId}:
    get:
      parameters: [{ name: businessId, in: path, required: true, schema: { type: string } }]
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: balance }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /escrow/release/{assignmentId}:
    post:
      parameters: [{ name: assignmentId, in: path, required: true, schema: { type: string } }]
      responses: { '201': { description: released } }
  /me/payouts:
    get:
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: payouts for authenticated worker }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /payouts/{workerId}:
    get:
      parameters: [{ name: workerId, in: path, required: true, schema: { type: string } }]
      responses: { '200': { description: payouts } }
  /violation-flags:
    get: { responses: { '200': { description: list flags } } }
  /admin/assignments:
    get:
      security: [{ BearerAuth: [] }]
      responses: { '200': { description: admin assignment operations view } }
  /admin/payouts:
    get:
      security: [{ BearerAuth: [] }]
      responses: { '200': { description: admin payout operations view } }
  /admin/payouts/{payoutId}/status:
    post:
      parameters: [{ name: payoutId, in: path, required: true, schema: { type: string } }]
      security: [{ BearerAuth: [] }]
      responses: { '200': { description: update manual payout status } }
  /admin/problem-cases:
    get:
      security: [{ BearerAuth: [] }]
      responses: { '200': { description: flags + failed payouts + stalled assignments } }
